global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "workers"
    # Docker DNS resolves all worker replicas via the service name
    static_configs:
      - targets: ["worker:9100"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq_exporter:9419"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
